body:
  text: 清浙水崇壽沙門灌頂續法集疏此經義文分為二先略標章門將釋此經五門分別一教起因緣二藏乘教攝三宗趣通局四略釋題名五詳解文義後廣釋義相五初教起因緣初教起因緣者法華云諸佛唯以一大事因緣出現於世起信云有如是等八種因緣所以造論今此教興略開為十一為了世法虗幻故二為顯無為真常故三為破惡惱修慧故四為離欲患淨行故五為示耐苦守道故六為勸解怨興慈故七為明大乘心願故八為圓諸佛果覺故九為度衆生離苦故十為施教化與樂故二藏乘教攝二藏乘教攝者藏有二一三藏經律論也佛為弟子說八大覺經藏所攝二二藏菩薩聲聞也此是諸佛菩薩大人之所覺悟菩薩藏藏攝乘有二一五乘人天聲聞辟支菩薩也今教菩薩常念菩薩乘攝二四乘小乘羊車中乘鹿車大乘牛車一乘大白牛車也經云八事乃是佛菩薩覺大乘一乘所攝教有三一十二分教契經重頌授記諷頌因緣自說本事本生方廣未曾有譬喻論議也今此契經自說二分所攝二化儀十教本末差別依本起末攝末歸本本末無礙隨機不定顯密同時一時頓演寂寞無言該通三際重重無盡也今屬本末差別教中本分所攝一經始終唯大人覺定無異故三化法五教小始終頓圓也經云苦空無我初教空宗所攝又云精進廣學分教相宗所攝又云進趣菩提性宗實教所攝又云速登正覺頓教所攝又云念念滅罪普濟一切永斷常樂圓教所攝是知此經之義廣大深遠也矣三宗趣通局三宗趣通局者通辨諸宗儒教孔子宗於五常意以修身慎行齊家治國揚名後代也道教老子宗於自然意以融蕩是非齊平生死終歸虗無也釋教世尊宗於因緣意以識心達本斷惑證真稱體起用也小乘以生滅因緣為宗大乘以無性因緣為宗因緣即空空宗也因緣即假相宗也因緣即中性宗終頓圓也存二以顯中終義泯二以顯中頓義混融以顯中圓義故一代佛教通宗因緣也局論此經復有總別總以覺觀事法修心聖道為宗進趣菩提普濟一切令諸衆生悉以大樂為趣別有五對一教義教誦八大人覺文字為宗了達所詮八門義旨為趣二事理舉八重事相為宗顯八法理性為趣三境智所緣真俗諦境為宗能緣權實觀智為趣四修證精進修道梵行高遠為宗直趣菩提速登正覺為趣五體用圓滿菩提還歸覺體常住快樂為宗全大覺體發真如用普化一切為趣如是五對展轉相因而為生起也四略釋題名二初經題佛說八大人覺經四略釋題名者先隨相釋佛者梵語佛陀此云覺者準起信論具有三義一本覺即所證理二始覺即能證智三究竟覺即智與理冥始本不二也又一者自覺覺於我空異凡夫也二者覺他覺於法空異二乘也三者覺滿覺於俱空異菩薩也楞嚴云自覺己圓能覺他者如來應世即本師釋迦牟尼佛也說者悅也八音四辨暢本懷故中論云佛依二諦為衆生說法義無礙莫不歡悅揀非餘人說也八者法數一苦空二少欲三知足四精進五多聞六布施七梵行八心願即見定思進語業念命八正道也亦即理斷智位教因行果八法門也大人者菩薩稱為大道心衆生如來稱為大覺世尊覺者覺悟證知也先覺後覺自覺覺他名大人覺高出凡夫二乘唯自覺者華嚴云奇哉大導師自覺能覺他孟子曰大人者正己而物正者也八大人覺者經云如此八事乃是諸佛菩薩大人之所覺悟復還生死度脫衆生以前八事開導一切寶積亦云菩薩成就八法於諸佛前蓮華化生經者梵語修多羅此云契經契謂契理契機經謂貫說攝生也案五印土呼綵線席經井索聖教皆名修多羅線能貫華經能持緯索能汲水教能詮義敵對翻之應名聖教古德見此方聖說為經賢說為傳遂分借席經一義以目西方佛說名修多羅菩薩羅漢說名阿毗達磨又恐濫席經名更加契字揀之故名契經甚為允當次作對釋共有六義一通別經字通也通餘經故佛等別也別諸部故二人法佛說人也八覺法也三一多就法中八者多也大人覺一也不離一覺觀故四能所人為能覺為所經云大人之所覺悟五名德人則共有虗名大乃獨成實德六應感就人中佛者應也顯我能應法主也說者感也悅彼所感機宜也三離合釋佛之說經依主釋佛說有八大人覺經有財釋八大人覺經帶數釋八大人覺即經持業釋佛說八大人覺經非法華論四分律相違釋也四立名釋諸經得名或人或處或法或喻乍單乍復乍具乍缺此經以人法受稱也則一題名具四門義釋題尚爾況經文耶二譯人後漢安息國沙門安世高譯後漢標朝代對前高祖稱名曰後安息出處所揀非餘國土也沙門人也此言功勞修八正道有多功勞故秦言勤行勤行八覺進取涅槃故安世高字也譯者翻譯謂翻梵天之語轉成漢地之言音雖似別義則大同也傳云姓安名清字世高安息國王子也當嗣位讓國於叔而求出家博曉經綸七曜五行醫方異術無不綜達既而遊方遍歷諸國行見羣燕忽謂伴曰燕云應有送食者頃之果有致焉漢桓帝建和二年來到中夏通習華言宣譯佛經二十九部凡一伯七十六卷多有神迹自稱先身已經出家有一同學多瞋乃與辭訣云我當往廣畢宿世之對既而適廣州路逢一少年唾手拔刀乃延頸受刃無懼少年殺之觀者駭異已而神識還為安息王子今來遊化度昔同學靈帝建寧四年關洛擾亂乃附舟過廬山行達䢼亭湖廟神極靈能分風送往來之舟會同旅三十餘船奉牲請福神降祝曰舟有沙門請來入廟告高云吾昔與子出家學道好行布施而性多瞋今為䢼亭廟神此湖千里皆吾所轄壽盡旦夕當墮惡道有絹千匹并雜寶物可為立法營塔使生善處高向之梵語數番即取絹物辭別便達豫章遂以廟物為造東寺名曰大安乃江淮寺塔之始也暮有一少年長跽高前受其呪願高謂衆曰向之少年即䢼亭廟神得生善處離醜惡形矣後於山西澤中見一死蟒頭尾數里今潯陽郡大蛇村是高後復到廣州尋前害己少年時少年尚在高投其家說昔日償對之事歡喜相向謂云吾猶有餘報今當往會稽畢對廣州客悟高非凡豁然意解追悔前愆厚相資供隨高東遊遂達會稽至便入市正值羣鬪誤傷高首應時殞命廣客頻驗二報遂發心出家精勤佛法弘傳八大人覺經具說世高事緣遠近聞知莫不歎伏五詳解文義道安三分今古同遵考此文意似有正宗而無序通今以義判仍分為三初標八法誦念以發起為佛弟子常於晝夜至心誦念八大人覺三分中此當序分屬發起非證信也八大覺事佛菩薩本故不待問而自教誡文有四句初句人作成曰為妙覺曰佛解後曰弟從生曰子然有五位一本性二名字三相似四隨分五究竟今屬名字依佛為師更不皈依邪魔外道允成大乘佛弟子也次句時晝夜約日晝三夜三也常者約年盡形不懈也三四句法先行也至心意業行誦念身口行後教也八種法門諸佛菩薩大人之所覺者服佛之服誦佛之言行佛之行是佛而已矣若晝夜不念八大人覺豈稱佛弟子哉二詳八大法相以成宗分二先別釋八法以起信解八初覺身心無常觀念真常第一覺悟世間無常國土危脆四大苦空五陰無我生滅變異虗僞無主是心惡源形為罪藪如是觀察漸離生死此下八門當正宗也初門分二先覺知事相非真明而不昧謂之覺知而不迷謂之悟於中有八一三世世為遷流流數有三過去未來現在也無常有二一者敗壞無常二者念念無常過去諸法恍惚如夢現在諸法猶如電光未來諸法如雲歘起賢首疏云過去則無體難追現在則剎那不住未來則本無積聚故曰無常楞嚴云豈惟年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住二十方國土橫遍十方故界為方位方位有十四方四維上下也總收國界略為八類謂淨穢小大粗妙廣狹不安曰危虗浮曰脆三界不安猶如火宅塵剎虗浮喻同朝露經云假使妙高山劫盡皆散壞大海深無底亦復有枯竭大地及日月時至皆皈盡未曾有一事不被無常吞三四大堅相為地大潤濕為水大暖觸為火大動搖為風大內四大為苦外四大為空經云水火風土旋令覺知四大各離誰和合者則內四大皆苦空也又云火乃燒於色水復為爛壞風能令散滅四大互相違堅濕暖動法假名無有實大種本無生故無所造色則外四大亦苦空也四五陰根塵名色質礙為義違順名受領納為義苦樂名想取像為義善惡名行造作為義是非名識了別為義皆曰陰者蓋覆真性故無我者謂五陰中都無我主但形骸色思慮心耳楞伽云諸蘊業因和合而起離我我所是名行空圭山云色有地水火風心有受想行識若皆是我即成八我翻覆推析皆不可得便悟此身衆緣和合似我人相元無我人欲求出離修無我觀斷分別我執證我空真如即知五陰皆空無我也五生死生滅是生死之因生死為生滅之果天如云那箇生死業根只在汝一念生滅之間變異者遷改也經云我此之身雖未曾滅我觀前念念遷謝新新不住如火成灰决知此身當從滅盡然四相遷流有一期剎那二種之別以理推之生如石女懷兒住若陽焰翻浪異同浮雲千變滅猶狂華謝空六煩惱虗妄相想為虗假名無明為僞無主者謂此無明妄想因緣和合而有實無自性亦無有我觀此想念屬誰誰便是煩惱想歷歷見此一念想中無有主宰即人空慧如幻化相即法空慧頌曰一切妄想中因緣空無主七內心心六識也惡十惱三毒也根塵為緣識生其中聚緣內搖趣外奔逸昏昏擾擾以為性相是故心為功之首惡之魁也六識頌曰動身發語獨為最引滿能招業力牽息心達本無善無惡是一真源如如不動心矣八外身形身口也罪七支四種業也本末續生遞相為種喻如草木生長不絶故云藪也遺教云此是罪惡之物假名為身沒在老病生死大海智者除之如殺怨賊如是下次觀察法相對治五識照矚曰觀意識尋伺曰察如是結上八種覺悟上乃別明此句總攝謂世間國土五陰生滅虗僞心形皆為惡源罪藪無常苦空危脆無我變滅無主者也漸離者舉第五生死以該餘七也若對翻之轉無常壽命以成十世真常轉危脆家産以成性土悠久苦空大種成五大圓融無我陰處成法身真我變異生死成不滅不生無主虗想成無位真人翻惡源之心而為菩提道心翻罪藪之身而為涅槃法身如此最勝法益非觀察覺悟不能得成也二覺貪欲為苦觀念少欲第二覺知多欲為苦生死疲勞從貪欲起少欲無為身心自在先覺事相非真初一句現招苦惱唯識云云何為欲於所樂境希望為性欲境有五謂財色名食睡今約希望欲心不一而足曰多經云常求諸欲境苦者五苦中求不得苦也遺教云多欲之人多求利故苦惱亦多次二句當感生死生死果也疲勞輪轉不休故貪欲因也唯識云云何為貪於有有具染著為性貪愛為本欲樂為末圓覺云一切衆生從無始際由有種種恩愛貪欲故有轉回佛名經云有愛則生愛盡則滅故知生死貪愛為本文若去貪欲之因生死苦輪之報息矣少欲下次觀法相對治初句無為樂則無苦惱少欲而外無所貪無為而內無所作豈不逍遙暢快次句自在樂則無生死身離生老病死心離生住異滅豈不解脫自在經云少欲之人則無諂曲以求人意亦復不為諸根所牽行少欲者心則坦然無所憂畏有少欲者則有涅槃少欲既能生諸功德無欲更受無盡益矣三覺多求增罪觀念知足第三覺知心無厭足惟得多求增長罪惡菩薩不爾常念知足安貧守道惟慧是業先覺事非真也初句內存無厭足心次句外惟多求境物三漸增惡求罪過梵網云自為飲食錢財利養名譽故親近王臣恃作形勢橫取錢物名為惡求菩薩下次觀法對治菩薩心者利人為先豈有惡求多求故云不爾念知足如迦葉頭陀無厭斷矣貧樂道若顏回陋巷多求滅矣此則惑障除也空慧業猶善現阿蘭那行罪惡消矣此則業障除也惑業之因既絶苦報之果何來故遺教云汝等若欲脫諸苦惱當觀知足知足之法即是富樂安隱之處念知足也知足之人雖臥地上猶為安樂不知足者雖處天堂亦不稱意不知足者雖富而貧知足之人雖貧而富貧樂道也不知足者常為五欲所牽為知足者之所憐愍惟以二空觀慧為事業也四覺懈怠墜落觀念精進第四覺知懈怠墜落常行精進破煩惱惡摧伏四魔出陰界獄先覺事相懈則根身疲倦怠則心識恣放墜則墮下難上落則退後不前由此上弘下化之功自利利他之德皆喪失矣華嚴云如鑽燧求火未出而數息火勢隨止滅懈怠者亦然遺教云行者之心數數懈廢譬如鑽火未熱而息雖欲得火火難可得清涼疏約三慧以辨懈怠聞則聽習數息明解不生思則決擇數息真智不生修則定慧數息聖道不生懈怠之過豈細小哉常下次觀治法初一句總純一不雜曰精勇往直前曰進常行者一生不退也起信云一切時一切處所有衆善隨己堪能不捨修學遺教云若勤精進則事無難是故汝等當勤精進譬如小水常流則能穿石次三句別初即唯識論中攝善精進以諸十善破十惱惡八萬法行破八萬塵勞蓋此精進觀中法不欲其精無行不欲其進故亦即起信論明勤勇精進文云於諸善事心不懈退淨名云譬如勝怨乃可名勇此明見思無明怨賊皆悉破也二即唯識論中被甲精進四魔者一天魔二煩惱魔三五陰魔四生死魔摧伏者以知生死定為苦故佛果決然樂故衆生與己足可度故由是志堅不怯必定取辦與五陰魔煩惱魔死魔共戰有大功勳滅三毒出三界破魔網亦即起信論明難壞精進文云立志堅強遠離怯弱寶藏論云決歸者不顧其疲決戰者不顧其死決學者不顧其身決道者不重其事此其難壞相也後即唯識論中利樂精進陰即五陰界即三界獄者三界五陰如牢獄桎梏故出者尅己造修唯日不足直至超出陰界得大利樂而後已也亦即起信論明無足精進文云念過去久遠已來虗受一切身心大苦無有利益是故應勤修諸功德自利利他速離衆苦此明練磨其心修二利行堅固熾然總無厭足畢竟超出成最勝樂也破治怠失摧治懈失出治墜失精進法門廣矣大矣五覺愚癡無智觀念多聞第五覺悟愚癡生死菩薩常念廣學多聞增長智慧成就辨才教化一切悉以大樂先覺事相六識茫昧無知曰愚五根昏迷不曉曰癡愚為惑惱之首癡是惡業之元因也無明事理從冥入冥生死險道受苦不斷背去三寶貧無福慧不識苦盡道不知求解脫果也菩薩下次觀治法廣學博究三藏也多聞聽講十二部也增慧無觀不習故成辨無經不誦故聞即聞慧身根聰也智即思慧意識通也辨即修慧口舌利也上三句自度此教化句度他一切不揀道俗賢愚五性三根普皆化導也末一句自他均利也他得開通佛法樂自得增明教觀樂又自他現得六根通利樂當得三德安住樂並以出世大道揀非世間小果故云大也四弘對之聞即法門智即煩惱教即衆生樂即佛道前二治愚癡後二治生死六覺貧苦結怨觀念施善第六覺知貧苦多怨橫結惡緣菩薩布施等念怨親不念舊惡不憎惡人先覺事財産缺乏為貧饑寒逼迫為苦多怨者上則怨天下則怨人內則怨於父母妻子外則怨於師友親鄰書云貧而無怨難結惡緣者苦境怨心一時交接諸惡業緣無不備造所謂慳惜己物貪求人財嫉妬其富瞋恨其貴起諸邪見撥無因果好勇鬪狠欺長凌幼由此父子不和夫妻反目孟子曰無恆産而有恆心者惟士為能若民則無恆産因無恆心苟無恆心放辟邪侈無不為己而云橫者儒云死生有命富貴在天佛云今感貧富貴賤之報皆因前世慳施敬慢之業與人結諸怨尤豈不枉造空作惡耶菩薩下次觀法孔子曰貧與賤是人之所惡也不以其道得之不去也孟子曰古之人修其天爵而人爵從之仁義忠信樂善不倦此天爵也公卿大夫此人爵也今開四法即是去貧之道得爵之術也一布施經言為人貧困從慳貪中來為人大富從布施中來故以施治貧也有二財則四事七珍乃至一縷一麻法則五教三乘片言片行老子曰富貴者送人以財仁人者送人以言一言可以興則法施之拔苦與樂識不可較量也二等念經言有親則有怨離親即離怨今以同體慈悲怨親平等觀之善與人同樂取於人求仁得仁何怨之有孟子云不怨勝己者反求諸己而已矣故以等治怨也三不念如伯夷叔齊不念舊惡怨是用希是以有舊惡者當與勸釋不得加報也四不憎如子張之尊賢容衆嘉善而矜不能老子曰善人不善人之師不善人善人之資孔子曰三人行必有我師焉擇其善者而從之其不善者而改之是以見惡逆者當與教誡不得痛絶也三四治結惡四法一修貧苦無不離矣七覺五欲過患觀念梵行第七覺悟五欲過患雖為俗人不染世樂常念三衣瓦鉢法器志願出家守道清白梵行高遠慈悲一切初覺事五欲者五塵欲也過患者煩惱過也欲是境患是心由外塵欲牽起愛心瑜伽云欲有二種一事境欲二煩惱欲經云由於欲境起諸違順老子曰五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨如五百仙聞甄陀女歌而失禪定一角老為淫女騎頸而無神通夏以妹喜商以姐己周以褒似並亡其國凡為道者須知過罪當訶責也世樂有十謂女色財寶聲名飲食睡眠家宅田園衣服眷屬官貴圓覺疏開為四相一內愛欲緣自身形按拭摩觸起諸染著二外愛欲緣他男女姿態妖艷念念貪愛三內外愛欲於自他身柔軟細滑攀緣不捨四遍一切處愛欲緣於一切五欲塵境生結縛心不染者猶如蓮華不著水亦如日月不住空也大論云五欲無樂如狗嚙骨五欲增諍如鳥競肉五欲燒人如執風炬五欲害人如踐毒蛇五欲無實如夢所得五欲不久如繫石火禪經偈云智者應觀身不貪染世樂無纍無所欲是名真涅槃豈可入道則淨涉俗便染耶常下次觀法有五一衣鉢迦葉受頭陀法衣但糞掃三衣食常次第乞食器即香爐鍚杖念珠澡瓶梵網云菩薩行頭陀時此十八物常隨其身二出家阿蘭若處離於聚落放牧聲絶無諸憒閙此則出五欲塵染之家入一真寂靜之家曰志願者身雖俗家心實佛家也四句揀之一心形俱不出家二心形俱出家三心出形不出四形出心不出今當第三句此二治為俗四十二章經云受道法者去世資財乞求取足日中一食樹下一宿慎勿再矣使人愚蔽者愛與欲也三守道謂守涅槃清淨之道出離生死濁海守菩提潔白之道解脫煩惱淤泥此一治五欲過患四梵行有三一明悟欲心二潔淨欲身三不犯欲塵出世第一如梵天行高超六欲遠越釋天如諸佛所說一心一意行數息在禪定是名行頭陀此一治不染世樂五慈悲慈與一切之樂悲拔一切之苦若非一味法雨何能三根普潤此句總治三種也配四法門初二理三果四行五教也問二七何別答二約能緣莫起多欲心也七約所緣莫染五塵欲也八覺生死苦惱觀念心願第八覺知生死熾然苦惱無量發大乘心普濟一切願代衆生受無量苦令諸衆生畢竟大樂先覺事相生死者三界內外有二種生死稱為苦海第一分段生死即六道衆生四大所成身體有分齊段落受其生生滅滅第二變易生死即聲聞菩薩雖離分段之身未得圓證法身常寂不免四相遷流因移果易熾然者楞嚴云生死死生生生死死如旋火輪未有休息苦惱無量者苦有三苦八苦一百一十苦惱有六惱十惱八萬四千惱問前後何別答初明一切生死虗幻不實二明自他生死因貪欲起五明自己生死愚迷癡受八明衆生生死發心普濟又四明自己多欲便多苦惱六明自他貧苦多怨結惡七明一切五欲皆有過患八明衆生苦惱誓願代受故前後不同也四句揀之謂一人受一生死苦惱一人受多生死苦惱多人受一生死苦惱多人受多生死苦惱復有四句謂同業同報別業別報同業別報別業同報故如火之熾然空之無量發下次觀法相初二句發心濟一切出生死自未得度先度人者菩薩發心三心四願乃菩薩之初因也起信云發心盡於未來化度一切衆生使無有餘皆令究竟無餘涅槃故云普濟次願代二句立願代衆生受苦惱還源觀云普代衆生受苦者謂修諸行法不為自身但欲廣利羣生冤親平等普令斷惡備修萬行速證菩提又菩薩大悲大願以身為質於三惡趣救贖一切受苦衆生惡令得樂盡未來際心無退屈不於衆生希望毛髮報恩之心問衆生無量業苦無邊云何菩薩而能普代衆生受苦答菩薩代衆生受苦者由大悲方便力故但以衆生妄執不了業體從妄而生無由出苦菩薩教令修止觀兩門心無暫替因亡果喪苦業無由得生但令不入三途名為普代衆生受苦惱也後令諸二句誓令與無上二果樂起信云為令衆生離一切苦得究竟樂非求世間名利恭敬故賢首疏云苦者二死煩惱苦也樂者無上菩提覺法樂無上涅槃寂靜樂非求者非欲令其求於後世人天利樂長水記云凡諸菩薩有所作為皆為衆生離苦得樂此令轉滅煩惱生死得此菩提涅槃一得永得大患永滅超度四流不亦樂乎然上離苦是菩薩大悲此令得樂是菩薩大慈至覺之心於焉備矣後總結三覺以成行證如此八事乃是諸佛菩薩大人之所覺悟精進行道慈悲修慧乘法身船至涅槃岸復還生死度脫衆生以前八事開導一切令諸衆生覺生死苦捨離五欲修心聖道先結前八事有大人之事有小人之事前七自利第八利他故屬諸佛一乘菩薩大乘之事非比自利小乘界內人天乘輕細事也孟子曰從其大體為大人從其小體為小人然事為所觀境覺為能知心佛是滿覺先覺果地覺菩薩是始覺後覺因地覺也精下次起後三覺初四句自覺復還下覺他合則三覺圓矣又精進四法行道正助道品也三法慈悲七法修慧二空觀知也五法法身無為法性也經云夫為道者猶木在水尋流而行不觸兩岸不為洄流吾保此木決定入海學道之人不為情欲所惑不為衆邪所嬈精進無為吾保此人必得道矣當第一涅槃秦言滅度義翻圓寂唯識明四種一性淨涅槃二有餘涅槃三無餘涅槃四無住涅槃今屬後二也當第二復還生死海代受苦惱八也度脫惡衆生怨親平等六也上乃自覺八事下以前等覺他八事開導五六也覺苦一八也離欲二七也修道三四也修習自心入於聖道故肇師曰佛者何也蓋窮理盡性大覺之稱也生死長寢莫能自覺自覺覺彼其唯佛也佛地論云於一切法一切種相能自開覺亦能開覺一切有情故名為佛今依八事覺之豈有不成正覺也哉三結八門利益以廣通若佛弟子誦此八事於念念中滅無量罪進趣菩提速登正覺永斷生死常住快樂此當流通分也初舉能修法行於念下次顯所獲勝益略開有五一滅罪罪業為因苦報為果修行斷惑罪滅福生矣二趣果五十五位真菩提路必須多聞廣慧而進今誦八大人覺自到菩提覺道經云觀靈覺即菩提如是知識得道疾矣三成覺迅疾曰速成證曰登中直曰正種智曰覺過五十五菩提路已方盡妙覺成無上道坐華王座名登正覺四斷死五住究盡二死永亡也五住樂約三身釋法性身土無為不動真常樂故受用身土具足無量快樂相故變化身土相續不斷諸法樂故廣開為八一二果成證樂二依正常然樂三恆見諸佛樂四時聞妙法樂五賢聖相會樂六衆生離苦樂七願行廣大樂八本覺真常樂三德配之念念滅罪解脫德也菩提正覺般若德也永斷常樂法身德也三德五益唯此經為然可不誦習而力行之音釋䢼九容切音恭亭名轄胡瞎切音轄淨土三經論清彭際清述卍云無量壽經起信論觀無量壽佛經約論及阿彌陀經約論之三般合稱三經解既分出別處故省于此
