front:
  text: 佛說八大人覺經疏序龍植衆生迷而不覺諸佛覺而不迷世間虗而不實法性實而不虗即生心而見佛心即世界而成法界者其惟八大人覺經焉不考其文罔徵迷悟之本不研其義靡測真妄之源小人不可大受而可小知於雞園應語小乘君子不可小知而可大受為佛子宜揚大覺少欲知足顯頭陀之妙行發心博施示菩薩之初因清白翻乎世染聞慧轉乎顓愚精進治疲怠之病苦空化極樂之佛若不闡三界九類曷能乘法身之航經或不傳六道四生無以至涅槃之岸幸承世高奉譯聖教宣明自漢迄今未蒙訓解續法避靜泉石養疾山川偶閲斯文隨修其疏庶令八大覺門如杲日之昭乎中天五尊勝益似甘霖之潤乎稿木凡見聞隨喜者宜勸勉啓迪焉康熙二十九年歲次庚午五月端陽節日灌頂行者續法題於崇壽紫竹林間
